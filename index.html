    .testimonial-card.featured .testimonial-body { color: rgba(255,255,255,.8); }
    .testimonial-footer { display: flex; align-items: center; gap: 10px; }
    .stars { display: flex; gap: 3px; }
    .stars svg { color: #F5A623; }
    .testimonial-card.featured .stars svg { color: rgba(255,255,255,.9); }
    .reviewer-name { font-family: var(--font-display); font-weight: 700; font-size: .88rem; letter-spacing: .06em; text-transform: uppercase; color: var(--black); }
    .testimonial-card.featured .reviewer-name { color: #fff; }

    /* ── SERVICE AREA ── */
    #service-area { padding: var(--sp); }
    .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .area-content h2 { margin-bottom: 16px; }
    .area-content p { margin-bottom: 16px; }
    .area-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .area-tag { background: var(--off-white); border: 1px solid var(--grey-light); border-radius: 20px; padding: 6px 16px; font-size: .8rem; font-weight: 600; color: var(--black); display: flex; align-items: center; gap: 6px; }
    .area-tag svg { color: var(--red); }
    .map-embed { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--grey-light); aspect-ratio: 4/3; }
    .map-embed iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── CTA STRIP ── */
    #cta-strip { padding: clamp(48px,6vw,80px) clamp(16px,5vw,60px); background: var(--red); text-align: center; }
    #cta-strip h2 { color: #fff; margin-bottom: 12px; font-size: clamp(1.7rem,3.2vw,2.6rem); }
    #cta-strip p { color: rgba(255,255,255,.8); max-width: 500px; margin: 0 auto 32px; }
    .cta-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* ── FOOTER ── */
    #footer { background: var(--black-mid); color: rgba(255,255,255,.6); padding: clamp(48px,6vw,80px) clamp(16px,5vw,60px) 0; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .footer-logo-img { height: 44px; width: auto; object-fit: contain; margin-bottom: 16px; filter: brightness(0) invert(1); }
    .footer-tagline { font-size: .84rem; line-height: 1.65; margin-bottom: 20px; }
    .footer-social { display: flex; gap: 10px; }
    .social-btn { width: 36px; height: 36px; background: rgba(255,255,255,.07); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.6); transition: background .15s, color .15s; }
    .social-btn:hover { background: var(--red); color: #fff; }
    .social-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }
    .footer-col h4 { font-family: var(--font-display); font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #fff; margin-bottom: 16px; }
    .footer-links { display: flex; flex-direction: column; gap: 8px; }
    .footer-links a { font-size: .85rem; color: rgba(255,255,255,.52); transition: color .15s; }
    .footer-links a:hover { color: #fff; }
    .footer-contact-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; font-size: .85rem; }
    .footer-contact-item svg { color: var(--red); flex-shrink: 0; margin-top: 2px; }
    .footer-contact-item a { color: rgba(255,255,255,.7); }
    .footer-contact-item a:hover { color: #fff; text-decoration: underline; }
    .footer-hours-row { display: flex; justify-content: space-between; font-size: .81rem; margin-bottom: 8px; }
    .footer-hours-row span:first-child { color: rgba(255,255,255,.46); }
    .footer-hours-row span:last-child { color: #fff; font-weight: 500; }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 20px 0; flex-wrap: wrap; font-size: .76rem; color: rgba(255,255,255,.3); }
    .footer-bottom a { color: rgba(255,255,255,.45); }
    .footer-bottom a:hover { color: #fff; }
    .footer-bottom-links { display: flex; gap: 16px; }

    /* ── CONSENT BANNER ── */
    #consent-banner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 8000; background: var(--black-mid); border-top: 3px solid var(--red); padding: 18px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; box-shadow: 0 -4px 24px rgba(0,0,0,.3); transform: translateY(100%); transition: transform .35s cubic-bezier(.22,1,.36,1); }
    #consent-banner.visible { transform: translateY(0); }
    #consent-banner.hidden { display: none; }
    .consent-text { flex: 1; min-width: 260px; font-size: .84rem; color: rgba(255,255,255,.72); }
    .consent-text strong { color: #fff; }
    .consent-text a { color: var(--red); text-decoration: underline; }
    .consent-actions { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .btn-ca { padding: 10px 20px; font-family: var(--font-display); font-weight: 700; font-size: .76rem; letter-spacing: .1em; text-transform: uppercase; border-radius: var(--radius-sm); cursor: pointer; border: 2px solid transparent; transition: background .15s, color .15s, border-color .15s; }
    .btn-ca:focus-visible { outline: 3px solid var(--red); outline-offset: 3px; }
    .btn-ca-accept { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-ca-accept:hover { background: var(--red-dark); }
    .btn-ca-decline { background: transparent; color: rgba(255,255,255,.6); border-color: rgba(255,255,255,.2); }
    .btn-ca-decline:hover { border-color: rgba(255,255,255,.5); color: #fff; }

    /* ── ADA ACCESSIBILITY WIDGET ── */
    /* Floating trigger button */
    #a11y-widget { position: fixed; bottom: 28px; right: 28px; z-index: 9000; font-family: var(--font-body); }

    #a11y-toggle {
      width: 56px; height: 56px;
      background: var(--red);
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
      box-shadow: 0 4px 24px rgba(196,30,30,.5), 0 0 0 3px rgba(196,30,30,.2);
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    #a11y-toggle:hover  { background: var(--red-dark); transform: scale(1.08); }
    #a11y-toggle:focus-visible { outline: 4px solid var(--red); outline-offset: 5px; }
    #a11y-toggle-label {
      position: absolute; bottom: 62px; right: 0;
      background: var(--black); color: #fff;
      font-size: .68rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #a11y-widget:hover #a11y-toggle-label,
    #a11y-toggle:focus + #a11y-toggle-label { opacity: 1; }

    /* Panel */
    #a11y-panel {
      position: absolute; bottom: 68px; right: 0;
      width: 320px;
      background: #fff;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18), 0 4px 16px rgba(0,0,0,.1);
      display: none; overflow: hidden;
      animation: a11y-slide-up .22s cubic-bezier(.22,1,.36,1) both;
    }
    #a11y-panel.open { display: block; }
    @keyframes a11y-slide-up {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Panel header */
    .a11y-header {
      background: var(--black);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .a11y-header-left { display: flex; align-items: center; gap: 10px; }
    .a11y-header-icon {
      width: 30px; height: 30px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .a11y-header h3 {
      font-family: var(--font-body);
      font-size: .85rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #fff; margin: 0;
    }
    .a11y-header-sub {
      font-size: .65rem; color: rgba(255,255,255,.45);
      letter-spacing: .06em; text-transform: uppercase;
      display: block; margin-top: 1px;
    }
    .a11y-close {
      background: rgba(255,255,255,.1); border: none;
      color: rgba(255,255,255,.7); cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .a11y-close:hover { background: rgba(255,255,255,.2); color: #fff; }
    .a11y-close:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    /* Section labels */
    .a11y-section-label {
      font-size: .67rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: rgba(0,0,0,.35);
      padding: 12px 14px 4px;
    }

    /* Font size row */
    .a11y-font-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px 6px;
    }
    .a11y-font-label { font-size: .88rem; font-weight: 500; color: var(--black); flex: 1; }
    .a11y-font-btns { display: flex; gap: 5px; }
    .a11y-font-btn {
      width: 32px; height: 32px;
      background: #f4f4f4; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer;
      font-weight: 700; font-size: .82rem; color: var(--black);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .a11y-font-btn:hover { background: #e8e8e8; border-color: #bbb; }
    .a11y-font-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    .a11y-font-size-display {
      font-size: .78rem; font-weight: 600; color: var(--grey-mid);
      min-width: 32px; text-align: center;
    }

    /* Toggle options */
    .a11y-options { padding: 4px 10px 6px; display: flex; flex-direction: column; gap: 1px; }
    .a11y-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left;
      transition: background .12s;
    }
    .a11y-option:hover { background: #f5f5f5; }
    .a11y-option:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    .a11y-option-label {
      display: flex; align-items: center; gap: 10px;
      font-size: .87rem; font-weight: 500; color: #111;
    }
    .a11y-opt-icon {
      width: 32px; height: 32px;
      background: #f0f0f0; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: #555; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .a11y-option.active .a11y-opt-icon { background: var(--red); color: #fff; }
    .a11y-option-desc { font-size: .72rem; color: #999; display: block; margin-top: 1px; font-weight: 400; }

    /* Toggle pill */
    .pill {
      width: 38px; height: 22px;
      background: #ddd; border-radius: 11px;
      position: relative; flex-shrink: 0;
      transition: background .2s;
    }
    .pill::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .a11y-option.active .pill { background: var(--red); }
    .a11y-option.active .pill::after { transform: translateX(16px); }

    /* Divider */
    .a11y-divider { height: 1px; background: #f0f0f0; margin: 4px 14px; }

    /* Reset button */
    .a11y-reset {
      margin: 8px 14px 14px;
      width: calc(100% - 28px);
      padding: 9px;
      background: #f5f5f5; border: 1px solid #e0e0e0;
      border-radius: 8px; cursor: pointer;
      font-family: var(--font-body); font-size: .82rem; font-weight: 600;
      color: #555; text-align: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    .a11y-reset:hover { background: #ffe8e8; border-color: var(--red); color: var(--red); }
    .a11y-reset:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    /* Footer */
    .a11y-footer {
      background: #fafafa; border-top: 1px solid #f0f0f0;
      padding: 8px 14px; text-align: center;
    }
    .a11y-footer a {
      font-size: .72rem; color: var(--grey-mid);
      text-decoration: underline;
    }
    .a11y-footer a:hover { color: var(--red); }

    /* ── READING MASK (horizontal band that follows cursor) ── */
    #a11y-reading-mask {
      display: none;
      position: fixed; left: 0; right: 0; z-index: 8900;
      pointer-events: none;
    }
    #a11y-reading-mask .mask-top,
    #a11y-reading-mask .mask-bot {
      position: fixed; left: 0; right: 0;
      background: rgba(0,0,0,.65);
      pointer-events: none;
    }
    #a11y-reading-mask .mask-top { top: 0; }
    #a11y-reading-mask .mask-bot { bottom: 0; }
    #a11y-reading-mask .mask-highlight {
      position: fixed; left: 0; right: 0;
      height: 40px;
      background: rgba(255,255,230,.08);
      border-top: 2px solid rgba(255,255,0,.4);
      border-bottom: 2px solid rgba(255,255,0,.4);
      pointer-events: none;
    }

    /* ── CURSOR GUIDE ── */
    #a11y-cursor-h, #a11y-cursor-v {
      display: none;
      position: fixed; z-index: 8800;
      pointer-events: none;
      background: rgba(196,30,30,.35);
    }
    #a11y-cursor-h { left: 0; right: 0; height: 2px; }
    #a11y-cursor-v { top: 0; bottom: 0; width: 2px; }

    /* ── A11Y MODE CLASSES ── */
    body.a11y-large-text { font-size: 20px !important; }
    body.a11y-high-contrast {
      --off-white: #fff !important;
      --grey-mid:  #111 !important;
      --grey-light:#888 !important;
      --grey-soft: #555 !important;
    }
    body.a11y-high-contrast p, body.a11y-high-contrast .svc-desc,
    body.a11y-high-contrast .testimonial-body, body.a11y-high-contrast .step-body {
      color: #111 !important;
    }
    body.a11y-high-contrast .service-card,
    body.a11y-high-contrast .testimonial-card { border: 2px solid #000 !important; }
    body.a11y-high-contrast a:focus-visible,
    body.a11y-high-contrast button:focus-visible { outline: 4px solid #000 !important; }

    body.a11y-reduce-motion *,
    body.a11y-reduce-motion .gallery-track { animation: none !important; transition: none !important; }

    body.a11y-dyslexia-font,
    body.a11y-dyslexia-font p,
    body.a11y-dyslexia-font li,
    body.a11y-dyslexia-font a,
    body.a11y-dyslexia-font span,
    body.a11y-dyslexia-font button {
      font-family: Arial, Helvetica, sans-serif !important;
      letter-spacing: .06em !important;
      word-spacing: .18em !important;
      line-height: 1.95 !important;
    }

    body.a11y-links-underline a { text-decoration: underline !important; }

    body.a11y-focus-highlight *:focus { outline: 3px solid var(--red) !important; outline-offset: 4px !important; }

    body.a11y-desaturate { filter: grayscale(100%); }
    body.a11y-desaturate #a11y-widget { filter: none; }

      <button class="a11y-option" id="opt-underline-links" aria-pressed="false" aria-describedby="desc-ul">

    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .service-card { background: #fff; border-radius: var(--radius-md); overflow: hidden; position: relative; border: 1px solid var(--grey-light); transition: box-shadow .2s, transform .2s; }
    .service-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-4px); }
    .svc-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
    .svc-body-wrap { padding: 22px 20px 24px; }
    .svc-icon { width: 40px; height: 40px; background: var(--red-glow); color: var(--red); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .svc-title { font-family: var(--font-display); font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: .03em; color: var(--black); margin-bottom: 8px; }
    .svc-desc { font-size: .9rem; color: var(--grey-mid); line-height: 1.78; }

    /* ── GALLERY STRIP ── */
    #gallery { overflow: hidden; background: var(--black); }
    .gallery-track { display: flex; gap: 4px; animation: scroll-gallery 40s linear infinite; width: max-content; }
    .gallery-track:hover { animation-play-state: paused; }
    @keyframes scroll-gallery {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .gallery-item { flex-shrink: 0; width: 320px; height: 220px; overflow: hidden; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
    .gallery-item:hover img { transform: scale(1.06); }
    @media (prefers-reduced-motion: reduce) {
      .gallery-track { animation: none; }
    }

    /* ── DIFFERENCE ── */
    #difference { padding: var(--sp); background: var(--black); color: #fff; position: relative; overflow: hidden; }
    #difference::before { content: ''; position: absolute; top: -30%; right: -8%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(196,30,30,.1) 0%, transparent 70%); pointer-events: none; }
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
    .diff-img { border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; }
    .diff-img img { width: 100%; height: 100%; object-fit: cover; }
    .diff-content h2 { color: #fff; margin-bottom: 24px; }
    .diff-content h2 span { color: var(--red); }
    .diff-content p { color: rgba(255,255,255,.58); margin-bottom: 14px; }
    .diff-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
    .diff-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius-md); padding: 18px 20px; display: flex; gap: 14px; align-items: flex-start; transition: background .2s, border-color .2s; }
    .diff-card:hover { background: rgba(196,30,30,.08); border-color: rgba(196,30,30,.3); }
    .diff-card-icon { width: 38px; height: 38px; background: var(--red); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
    .diff-card-body h4 { color: #fff; font-size: .9rem; margin-bottom: 3px; }
    .diff-card-body p { font-size: .82rem; color: rgba(255,255,255,.48); margin: 0; }
    .diff-actions { margin-top: 32px; display: flex; gap: 14px; flex-wrap: wrap; }

    /* ── PROCESS ── */
    #process { padding: var(--sp); background: var(--off-white); }
    .process-steps { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; margin-top: 56px; position: relative; }
    .process-steps::before { content: ''; position: absolute; top: 27px; left: calc(100%/12); right: calc(100%/12); height: 2px; background: var(--grey-light); z-index: 0; }
    .process-step { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 8px; position: relative; z-index: 1; }
    .step-img { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; border: 3px solid var(--grey-light); margin-bottom: 16px; background: var(--grey-light); transition: border-color .2s; flex-shrink: 0; }
    .step-img img { width: 100%; height: 100%; object-fit: cover; }
    .process-step:hover .step-img { border-color: var(--red); }
    .step-num-badge { position: absolute; top: 36px; right: calc(50% - 36px); width: 18px; height: 18px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 900; font-size: .6rem; color: #fff; z-index: 2; }
    .step-title { font-family: var(--font-display); font-weight: 700; font-size: .82rem; text-transform: uppercase; letter-spacing: .06em; color: var(--black); margin-bottom: 6px; }
    .step-body { font-size: .76rem; color: var(--grey-mid); line-height: 1.55; }

    /* ── TEAM SECTION ── */
    #team { padding: var(--sp); }
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
    .team-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .team-photo { border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 3/4; }
    .team-photo img { width: 100%; height: 100%; object-fit: cover; }
    .team-photo.tall { grid-row: span 2; aspect-ratio: auto; }
    .team-content h2 { margin-bottom: 16px; }
    .team-content h2 span { color: var(--red); }
    .team-content p { margin-bottom: 14px; }
    .team-quote { background: var(--off-white); border-left: 4px solid var(--red); padding: 20px 24px; border-radius: 0 var(--radius-md) var(--radius-md) 0; margin-top: 24px; }
    .team-quote p { font-size: .95rem; color: var(--black); font-style: italic; margin: 0 0 8px; }
    .team-quote cite { font-size: .75rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); font-style: normal; }

    /* ── CONVENIENCE ── */
    #convenience { padding: var(--sp); background: var(--black); color: #fff; }
    .conv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
    .conv-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .conv-img { border-radius: var(--radius-md); overflow: hidden; }
    .conv-img img { width: 100%; height: 100%; object-fit: cover; }
    .conv-img.tall { grid-row: span 2; }
    .conv-img.tall img { aspect-ratio: auto; height: 100%; }
    .conv-img:not(.tall) img { aspect-ratio: 4/3; }
    .conv-content h2 { color: #fff; margin-bottom: 8px; }
    .conv-content h2 span { color: var(--red); }
    .conv-content > p { color: rgba(255,255,255,.58); margin-bottom: 24px; }
    .conv-bullets { display: flex; flex-direction: column; gap: 14px; }
    .conv-bullet { display: flex; gap: 14px; align-items: flex-start; }
    .conv-bullet-icon { width: 38px; height: 38px; background: var(--red); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
    .conv-bullet-text strong { display: block; font-weight: 600; color: #fff; margin-bottom: 2px; font-size: .9rem; }
    .conv-bullet-text span { font-size: .84rem; color: rgba(255,255,255,.5); }

    /* ── TESTIMONIALS ── */
    #testimonials { padding: var(--sp); background: var(--off-white); }
    .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
    .testimonial-card { background: #fff; border-radius: var(--radius-md); padding: 28px 24px; border: 1px solid var(--grey-light); transition: box-shadow .2s, transform .2s; }
    .testimonial-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-4px); }
    .testimonial-card.featured { background: var(--red); border-color: var(--red); color: #fff; }
    .quote-mark { font-family: var(--font-display); font-size: 4.5rem; font-weight: 900; color: var(--red); line-height: .9; margin-bottom: 8px; display: block; }
    .testimonial-card.featured .quote-mark { color: rgba(255,255,255,.35); }
    .testimonial-title { font-family: var(--font-display); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; color: var(--black); margin-bottom: 12px; }
    .testimonial-card.featured .testimonial-title { color: #fff; }
    .testimonial-body { font-size: .86rem; line-height: 1.7; color: var(--grey-mid); margin-bottom: 22px; }
    .testimonial-card.featured .testimonial-body { color: rgba(255,255,255,.8); }
    .testimonial-footer { display: flex; align-items: center; gap: 10px; }
    .stars { display: flex; gap: 3px; }
    .stars svg { color: #F5A623; }
    .testimonial-card.featured .stars svg { color: rgba(255,255,255,.9); }
    .reviewer-name { font-family: var(--font-display); font-weight: 700; font-size: .88rem; letter-spacing: .06em; text-transform: uppercase; color: var(--black); }
    .testimonial-card.featured .reviewer-name { color: #fff; }

    /* ── SERVICE AREA ── */
    #service-area { padding: var(--sp); }
    .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .area-content h2 { margin-bottom: 16px; }
    .area-content p { margin-bottom: 16px; }
    .area-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .area-tag { background: var(--off-white); border: 1px solid var(--grey-light); border-radius: 20px; padding: 6px 16px; font-size: .8rem; font-weight: 600; color: var(--black); display: flex; align-items: center; gap: 6px; }
    .area-tag svg { color: var(--red); }
    .map-embed { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--grey-light); aspect-ratio: 4/3; }
    .map-embed iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── CTA STRIP ── */
    #cta-strip { padding: clamp(48px,6vw,80px) clamp(16px,5vw,60px); background: var(--red); text-align: center; }
    #cta-strip h2 { color: #fff; margin-bottom: 12px; font-size: clamp(1.7rem,3.2vw,2.6rem); }
    #cta-strip p { color: rgba(255,255,255,.8); max-width: 500px; margin: 0 auto 32px; }
    .cta-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* ── FOOTER ── */
    #footer { background: var(--black-mid); color: rgba(255,255,255,.6); padding: clamp(48px,6vw,80px) clamp(16px,5vw,60px) 0; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .footer-logo-img { height: 44px; width: auto; object-fit: contain; margin-bottom: 16px; filter: brightness(0) invert(1); }
    .footer-tagline { font-size: .84rem; line-height: 1.65; margin-bottom: 20px; }
    .footer-social { display: flex; gap: 10px; }
    .social-btn { width: 36px; height: 36px; background: rgba(255,255,255,.07); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.6); transition: background .15s, color .15s; }
    .social-btn:hover { background: var(--red); color: #fff; }
    .social-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }
    .footer-col h4 { font-family: var(--font-display); font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #fff; margin-bottom: 16px; }
    .footer-links { display: flex; flex-direction: column; gap: 8px; }
    .footer-links a { font-size: .85rem; color: rgba(255,255,255,.52); transition: color .15s; }
    .footer-links a:hover { color: #fff; }
    .footer-contact-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; font-size: .85rem; }
    .footer-contact-item svg { color: var(--red); flex-shrink: 0; margin-top: 2px; }
    .footer-contact-item a { color: rgba(255,255,255,.7); }
    .footer-contact-item a:hover { color: #fff; text-decoration: underline; }
    .footer-hours-row { display: flex; justify-content: space-between; font-size: .81rem; margin-bottom: 8px; }
    .footer-hours-row span:first-child { color: rgba(255,255,255,.46); }
    .footer-hours-row span:last-child { color: #fff; font-weight: 500; }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 20px 0; flex-wrap: wrap; font-size: .76rem; color: rgba(255,255,255,.3); }
    .footer-bottom a { color: rgba(255,255,255,.45); }
    .footer-bottom a:hover { color: #fff; }
    .footer-bottom-links { display: flex; gap: 16px; }

    /* ── CONSENT BANNER ── */
    #consent-banner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 8000; background: var(--black-mid); border-top: 3px solid var(--red); padding: 18px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; box-shadow: 0 -4px 24px rgba(0,0,0,.3); transform: translateY(100%); transition: transform .35s cubic-bezier(.22,1,.36,1); }
    #consent-banner.visible { transform: translateY(0); }
    #consent-banner.hidden { display: none; }
    .consent-text { flex: 1; min-width: 260px; font-size: .84rem; color: rgba(255,255,255,.72); }
    .consent-text strong { color: #fff; }
    .consent-text a { color: var(--red); text-decoration: underline; }
    .consent-actions { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .btn-ca { padding: 10px 20px; font-family: var(--font-display); font-weight: 700; font-size: .76rem; letter-spacing: .1em; text-transform: uppercase; border-radius: var(--radius-sm); cursor: pointer; border: 2px solid transparent; transition: background .15s, color .15s, border-color .15s; }
    .btn-ca:focus-visible { outline: 3px solid var(--red); outline-offset: 3px; }
    .btn-ca-accept { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-ca-accept:hover { background: var(--red-dark); }
    .btn-ca-decline { background: transparent; color: rgba(255,255,255,.6); border-color: rgba(255,255,255,.2); }
    .btn-ca-decline:hover { border-color: rgba(255,255,255,.5); color: #fff; }

    /* ── ADA ACCESSIBILITY WIDGET ── */
    /* Floating trigger button */
    #a11y-widget { position: fixed; bottom: 28px; right: 28px; z-index: 9000; font-family: var(--font-body); }

    #a11y-toggle {
      width: 56px; height: 56px;
      background: var(--red);
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
      box-shadow: 0 4px 24px rgba(196,30,30,.5), 0 0 0 3px rgba(196,30,30,.2);
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    #a11y-toggle:hover  { background: var(--red-dark); transform: scale(1.08); }
    #a11y-toggle:focus-visible { outline: 4px solid var(--red); outline-offset: 5px; }
    #a11y-toggle-label {
      position: absolute; bottom: 62px; right: 0;
      background: var(--black); color: #fff;
      font-size: .68rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #a11y-widget:hover #a11y-toggle-label,
    #a11y-toggle:focus + #a11y-toggle-label { opacity: 1; }

    /* Panel */
    #a11y-panel {
      position: absolute; bottom: 68px; right: 0;
      width: 320px;
      background: #fff;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18), 0 4px 16px rgba(0,0,0,.1);
      display: none; overflow: hidden;
      animation: a11y-slide-up .22s cubic-bezier(.22,1,.36,1) both;
    }
    #a11y-panel.open { display: block; }
    @keyframes a11y-slide-up {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Panel header */
    .a11y-header {
      background: var(--black);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .a11y-header-left { display: flex; align-items: center; gap: 10px; }
    .a11y-header-icon {
      width: 30px; height: 30px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .a11y-header h3 {
      font-family: var(--font-body);
      font-size: .85rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #fff; margin: 0;
    }
    .a11y-header-sub {
      font-size: .65rem; color: rgba(255,255,255,.45);
      letter-spacing: .06em; text-transform: uppercase;
      display: block; margin-top: 1px;
    }
    .a11y-close {
      background: rgba(255,255,255,.1); border: none;
      color: rgba(255,255,255,.7); cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .a11y-close:hover { background: rgba(255,255,255,.2); color: #fff; }
    .a11y-close:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    /* Section labels */
    .a11y-section-label {
      font-size: .67rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: rgba(0,0,0,.35);
      padding: 12px 14px 4px;
    }

    /* Font size row */
    .a11y-font-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px 6px;
    }
    .a11y-font-label { font-size: .88rem; font-weight: 500; color: var(--black); flex: 1; }
    .a11y-font-btns { display: flex; gap: 5px; }
    .a11y-font-btn {
      width: 32px; height: 32px;
      background: #f4f4f4; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer;
      font-weight: 700; font-size: .82rem; color: var(--black);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .a11y-font-btn:hover { background: #e8e8e8; border-color: #bbb; }
    .a11y-font-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    .a11y-font-size-display {
      font-size: .78rem; font-weight: 600; color: var(--grey-mid);
      min-width: 32px; text-align: center;
    }

    /* Toggle options */
    .a11y-options { padding: 4px 10px 6px; display: flex; flex-direction: column; gap: 1px; }
    .a11y-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left;
      transition: background .12s;
    }
    .a11y-option:hover { background: #f5f5f5; }
    .a11y-option:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    .a11y-option-label {
      display: flex; align-items: center; gap: 10px;
      font-size: .87rem; font-weight: 500; color: #111;
    }
    .a11y-opt-icon {
      width: 32px; height: 32px;
      background: #f0f0f0; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: #555; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .a11y-option.active .a11y-opt-icon { background: var(--red); color: #fff; }
    .a11y-option-desc { font-size: .72rem; color: #999; display: block; margin-top: 1px; font-weight: 400; }

    /* Toggle pill */
    .pill {
      width: 38px; height: 22px;
      background: #ddd; border-radius: 11px;
      position: relative; flex-shrink: 0;
      transition: background .2s;
    }
    .pill::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .a11y-option.active .pill { background: var(--red); }
    .a11y-option.active .pill::after { transform: translateX(16px); }

    /* Divider */
    .a11y-divider { height: 1px; background: #f0f0f0; margin: 4px 14px; }

    /* Reset button */
    .a11y-reset {
      margin: 8px 14px 14px;
      width: calc(100% - 28px);
      padding: 9px;
      background: #f5f5f5; border: 1px solid #e0e0e0;
      border-radius: 8px; cursor: pointer;
      font-family: var(--font-body); font-size: .82rem; font-weight: 600;
      color: #555; text-align: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    .a11y-reset:hover { background: #ffe8e8; border-color: var(--red); color: var(--red); }
    .a11y-reset:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    /* Footer */
    .a11y-footer {
      background: #fafafa; border-top: 1px solid #f0f0f0;
      padding: 8px 14px; text-align: center;
    }
    .a11y-footer a {
      font-size: .72rem; color: var(--grey-mid);
      text-decoration: underline;
    }
    .a11y-footer a:hover { color: var(--red); }

    /* ── READING MASK (horizontal band that follows cursor) ── */
    #a11y-reading-mask {
      display: none;
      position: fixed; left: 0; right: 0; z-index: 8900;
      pointer-events: none;
    }
    #a11y-reading-mask .mask-top,
    #a11y-reading-mask .mask-bot {
      position: fixed; left: 0; right: 0;
      background: rgba(0,0,0,.65);
      pointer-events: none;
    }
    #a11y-reading-mask .mask-top { top: 0; }
    #a11y-reading-mask .mask-bot { bottom: 0; }
    #a11y-reading-mask .mask-highlight {
      position: fixed; left: 0; right: 0;
      height: 40px;
      background: rgba(255,255,230,.08);
      border-top: 2px solid rgba(255,255,0,.4);
      border-bottom: 2px solid rgba(255,255,0,.4);
      pointer-events: none;
    }

    /* ── CURSOR GUIDE ── */
    #a11y-cursor-h, #a11y-cursor-v {
      display: none;
      position: fixed; z-index: 8800;
      pointer-events: none;
      background: rgba(196,30,30,.35);
    }
    #a11y-cursor-h { left: 0; right: 0; height: 2px; }
    #a11y-cursor-v { top: 0; bottom: 0; width: 2px; }

    /* ── A11Y MODE CLASSES ── */
    body.a11y-large-text { font-size: 20px !important; }
    body.a11y-high-contrast {
      --off-white: #fff !important;
      --grey-mid:  #111 !important;
      --grey-light:#888 !important;
      --grey-soft: #555 !important;
    }
    body.a11y-high-contrast p, body.a11y-high-contrast .svc-desc,
    body.a11y-high-contrast .testimonial-body, body.a11y-high-contrast .step-body {
      color: #111 !important;
    }
    body.a11y-high-contrast .service-card,
    body.a11y-high-contrast .testimonial-card { border: 2px solid #000 !important; }
    body.a11y-high-contrast a:focus-visible,
    body.a11y-high-contrast button:focus-visible { outline: 4px solid #000 !important; }

    body.a11y-reduce-motion *,
    body.a11y-reduce-motion .gallery-track { animation: none !important; transition: none !important; }

    body.a11y-dyslexia-font,
    body.a11y-dyslexia-font p,
    body.a11y-dyslexia-font li,
    body.a11y-dyslexia-font a,
    body.a11y-dyslexia-font span,
    body.a11y-dyslexia-font button {
      font-family: Arial, Helvetica, sans-serif !important;
      letter-spacing: .06em !important;
      word-spacing: .18em !important;
      line-height: 1.95 !important;
    }

    body.a11y-links-underline a { text-decoration: underline !important; }

    body.a11y-focus-highlight *:focus { outline: 3px solid var(--red) !important; outline-offset: 4px !important; }

    body.a11y-desaturate { filter: grayscale(100%); }
    body.a11y-desaturate #a11y-widget { filter: none; }

<!-- ADA ACCESSIBILITY WIDGET — WCAG 2.1 AA -->
<div id="a11y-widget" role="complementary" aria-label="Accessibility options">

  <button
    id="a11y-toggle"
    aria-label="Accessibility options — open panel"
    aria-expanded="false"
    aria-controls="a11y-panel"
    aria-haspopup="dialog"
  >
    <!-- Wheelchair / person icon -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="4" r="1.5"/>
      <path d="M9.5 8.5h5L16 13h-4"/>
      <path d="M9.5 8.5L8 13l-2 5"/>
      <path d="M12 13l1 5"/>
      <path d="M8 20a3 3 0 006 0"/>
    </svg>
  </button>
  <span id="a11y-toggle-label" aria-hidden="true">Accessibility</span>

  <div
    id="a11y-panel"
    role="dialog"
    aria-modal="false"
    aria-labelledby="a11y-panel-title"
    aria-hidden="true"
  >
    <!-- Header -->
    <div class="a11y-header">
      <div class="a11y-header-left">
        <div class="a11y-header-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div>
          <h3 id="a11y-panel-title">Accessibility</h3>
          <span class="a11y-header-sub">WCAG 2.1 AA Compliant</span>
        </div>
      </div>
      <button class="a11y-close" id="a11y-close" aria-label="Close accessibility panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- TEXT SIZE -->
    <div class="a11y-section-label">Text Size</div>
    <div class="a11y-font-row">
      <span class="a11y-font-label">Adjust text size</span>
      <div class="a11y-font-btns" role="group" aria-label="Text size controls">
        <button class="a11y-font-btn" id="font-decrease" aria-label="Decrease text size">A−</button>
        <span class="a11y-font-size-display" id="font-size-display" aria-live="polite" aria-atomic="true">100%</span>
        <button class="a11y-font-btn" id="font-reset" aria-label="Reset text size to default">A</button>
        <button class="a11y-font-btn" id="font-increase" aria-label="Increase text size">A+</button>
      </div>
    </div>

    <div class="a11y-divider" role="separator"></div>

    <!-- VISION -->
    <div class="a11y-section-label">Vision</div>
    <div class="a11y-options" role="group" aria-label="Vision accessibility options">

      <button class="a11y-option" id="opt-high-contrast" aria-pressed="false" aria-describedby="desc-hc">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20V2z" fill="currentColor" stroke="none"/></svg>
          </span>
          <span>High Contrast<span class="a11y-option-desc" id="desc-hc">Increase color contrast</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-desaturate" aria-pressed="false" aria-describedby="desc-ds">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </span>
          <span>Grayscale<span class="a11y-option-desc" id="desc-ds">Remove all color</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-large-text" aria-pressed="false" aria-describedby="desc-lt">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </span>
          <span>Large Text<span class="a11y-option-desc" id="desc-lt">Increase all font sizes</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

    </div>

    <div class="a11y-divider" role="separator"></div>

    <!-- READING -->
    <div class="a11y-section-label">Reading</div>
    <div class="a11y-options" role="group" aria-label="Reading accessibility options">

      <button class="a11y-option" id="opt-dyslexia" aria-pressed="false" aria-describedby="desc-df">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </span>
          <span>Dyslexia Font<span class="a11y-option-desc" id="desc-df">Easier-to-read typeface</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-reading-mask" aria-pressed="false" aria-describedby="desc-rm2">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="10" width="18" height="4" rx="1"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </span>
          <span>Reading Mask<span class="a11y-option-desc" id="desc-rm2">Highlight line under cursor</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-underline-links" aria-pressed="false" aria-describedby="desc-ul">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v7a6 6 0 0012 0V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
          </span>
          <span>Underline Links<span class="a11y-option-desc" id="desc-ul">Make all links visible</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

    </div>

    <div class="a11y-divider" role="separator"></div>

    <!-- NAVIGATION -->
    <div class="a11y-section-label">Navigation & Motion</div>
    <div class="a11y-options" role="group" aria-label="Navigation accessibility options">

      <button class="a11y-option" id="opt-focus-highlight" aria-pressed="false" aria-describedby="desc-fh">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
          </span>
          <span>Focus Highlight<span class="a11y-option-desc" id="desc-fh">Emphasize keyboard focus</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-cursor" aria-pressed="false" aria-describedby="desc-cg">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
          </span>
          <span>Cursor Guide<span class="a11y-option-desc" id="desc-cg">Crosshair follows your mouse</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

      <button class="a11y-option" id="opt-reduce-motion" aria-pressed="false" aria-describedby="desc-rmot">
        <div class="a11y-option-label">
          <span class="a11y-opt-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
          </span>
          <span>Reduce Motion<span class="a11y-option-desc" id="desc-rmot">Stop animations</span></span>
        </div>
        <div class="pill" aria-hidden="true"></div>
      </button>

    </div>

    <!-- RESET -->
    <div class="a11y-divider" role="separator"></div>
    <button class="a11y-reset" id="a11y-reset" aria-label="Reset all accessibility settings to default">
      ↺ Reset All Settings
    </button>

    <!-- Footer -->
    <div class="a11y-footer">
      <a href="accessibility.html">View Accessibility Statement</a>
    </div>
  </div>

  <!-- Reading mask overlay -->
  <div id="a11y-reading-mask" aria-hidden="true">
    <div class="mask-top"></div>
    <div class="mask-highlight"></div>
    <div class="mask-bot"></div>
  </div>

  <!-- Cursor guide lines -->
  <div id="a11y-cursor-h" aria-hidden="true"></div>
  <div id="a11y-cursor-v" aria-hidden="true"></div>

</div>
